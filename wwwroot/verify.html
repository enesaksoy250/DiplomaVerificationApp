<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Diploma Doğrulama</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <header class="topbar">
    <a class="brand" href="/">Diploma Verification</a>
    <nav class="nav">
      <a href="/">Kayıt</a>
      <a class="active" href="/verify.html">Doğrulama</a>
    </nav>
  </header>

  <main class="shell">
    <section class="panel">
      <div class="panel-header">
        <p class="eyebrow">Blockchain Kontrolü</p>
        <h1>Diploma Doğrulama</h1>
        <p class="panel-description">PDF dosyasını yükleyerek blockchain kaydıyla eşleşip eşleşmediğini kontrol edin.</p>
      </div>

      <form id="verifyForm" class="form">
        <label class="file-zone" for="verifyFile">
          <span class="file-icon">PDF</span>
          <span class="file-copy">
            <span id="verifyFileName" class="file-title">PDF seç veya buraya sürükle</span>
            <span class="file-hint">Maksimum 10 MB, yalnızca PDF</span>
          </span>
          <input id="verifyFile" name="file" type="file" accept="application/pdf,.pdf" required>
        </label>
        <button class="primary-button" type="submit">Doğrula</button>
      </form>

      <div id="verifyMessage" class="message" hidden></div>
    </section>

    <section id="verifyResult" class="result-grid single" hidden>
      <article class="result-panel">
        <div class="section-heading">
          <h2>Doğrulama Sonucu</h2>
          <p>Hash kaydının blockchain üzerindeki durumu.</p>
        </div>
        <dl class="details">
          <div>
            <dt>Durum</dt>
            <dd id="verifyStatus"></dd>
          </div>
          <div>
            <dt>PDF Hash</dt>
            <dd class="hash-cell">
              <span id="verifyHash" class="hash-badge"></span>
              <button class="copy-button" type="button" data-copy-target="#verifyHash" aria-label="PDF hash kopyala"></button>
            </dd>
          </div>
          <div>
            <dt>Transaction Hash</dt>
            <dd class="hash-cell">
              <span id="verifyTx" class="hash-badge"></span>
              <button class="copy-button" type="button" data-copy-target="#verifyTx" aria-label="Transaction hash kopyala"></button>
            </dd>
          </div>
          <div>
            <dt>Blockchain Kayıt Tarihi</dt>
            <dd id="verifyTimestamp"></dd>
          </div>
          <div>
            <dt>Ağ</dt>
            <dd id="verifyNetwork"></dd>
          </div>
        </dl>
      </article>
    </section>
  </main>

  <script src="/app.js"></script>
</body>
</html>
